<!DOCTYPE html>
<html>
<head>
  <title>Eye-Tracking Web - Integration Version</title>
  
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />

  <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.js"></script>

  <script src="https://unpkg.com/@jspsych/extension-webgazer@1.0.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-webgazer-init-camera@1.0.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-webgazer-calibrate@1.0.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-webgazer-validate@1.0.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>

  <style>
    body { background-color: #f8f9fa; font-family: sans-serif; }
    .jspsych-btn { margin-bottom: 20px; }
  </style>
</head>
<body></body>
<script>
  // [부속품 1] 초기화 설정에 '빨간 점 보이기' 추가
  var jsPsych = initJsPsych({
    extensions: [
      { 
        type: jsPsychExtensionWebgazer,
        params: { show_predictions: true } // 화면에 실시간 시선 점을 표시합니다.
      }
    ],
    on_finish: function() {
      jsPsych.data.displayData();
    }
  });

  var timeline = [];

  // 2. 카메라 초기화
  var camera_init = {
    type: jsPsychWebgazerInitCamera,
    instructions: "<h3>카메라 설정</h3><p>얼굴을 중앙 가이드에 맞춰주세요. 화면에 빨간 점이 보이면 정상입니다.</p>",
    button_text: '준비 완료'
  };
  timeline.push(camera_init);

  // 3. 9점 보정 (정확도를 위해 9점으로 확장했습니다)
  var calibration = {
    type: jsPsychWebgazerCalibrate,
    calibration_points: [
      [10,10], [10,50], [10,90],
      [50,10], [50,50], [50,90],
      [90,10], [90,50], [90,90]
    ],
    calibration_mode: 'click'
  };
  timeline.push(calibration);

  // [부속품 2] 정확도 검증(Validation) 블록 추가
  var validation = {
    type: jsPsychWebgazerValidate,
    validation_points: [[25,25], [25,75], [75,25], [75,75], [50,50]],
    roi_radius: 100, // 이 범위 안에 시선이 들어오면 성공으로 간주
    show_validation_data: true // 검증 후 성적표를 화면에 보여줍니다.
  };
  timeline.push(validation);

  // 4. 테스트 문구
  var test = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: "<h1>검증 완료!</h1><p>성적표의 점들이 초록색에 가까울수록 정확한 것입니다.</p><p>아무 키나 누르면 원시 데이터를 확인합니다.</p>"
  };
  timeline.push(test);

  // 실행
  jsPsych.run(timeline);
</script>
</html>
